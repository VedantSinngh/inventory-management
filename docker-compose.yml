version: '3.9'

services:
  mongodb:
    image: mongo:6.0
    container_name: inventory-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongodb
      MONGO_INITDB_ROOT_PASSWORD: mongodb_password_dev
      MONGO_INITDB_DATABASE: inventorySystem
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - inventory-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: inventory-backend
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGO_URI: mongodb://mongodb:mongodb_password_dev@mongodb:27017/inventorySystem
      JWT_SECRET: dev-secret-key-min-32-chars-1234567890abcdef
      CORS_ORIGIN: http://localhost:3000
      SOCKET_IO_CORS_ORIGIN: http://localhost:3000
      SENDGRID_API_KEY: test-key
      LOG_LEVEL: debug
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - inventory-network
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./backend/logs:/app/logs
    healthcheck:
      test: curl -f http://localhost:5000/api/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: inventory-frontend
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:5000/api
      VITE_SOCKET_URL: http://localhost:5000
    depends_on:
      - backend
    networks:
      - inventory-network
    healthcheck:
      test: wget --quiet --tries=1 --spider http://localhost:3000/ || exit 1
      interval: 30s
      timeout: 10s
      retries: 3

  # Optional: Redis cache
  redis:
    image: redis:7-alpine
    container_name: inventory-redis
    ports:
      - "6379:6379"
    networks:
      - inventory-network
    healthcheck:
      test: redis-cli ping
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - optional

volumes:
  mongodb_data:
  mongodb_config:

networks:
  inventory-network:
    driver: bridge
