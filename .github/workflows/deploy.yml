name: Deploy to Railway

on:
  push:
    branches: [ full ]
  workflow_dispatch:

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    environment: production
    
    steps:
      - uses: actions/checkout@v3

      - name: Deploy backend to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          curl -fsSL https://railway.app/install.sh | bash
          railway link ${{ secrets.RAILWAY_BACKEND_PROJECT_ID }}
          railway up --service backend --detach

  deploy-frontend:
    runs-on: ubuntu-latest
    environment: production
    needs: deploy-backend
    
    steps:
      - uses: actions/checkout@v3

      - name: Deploy frontend to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        run: |
          npm install -g vercel
          vercel deploy --prod --token $VERCEL_TOKEN

  smoke-tests:
    runs-on: ubuntu-latest
    needs: [ deploy-backend, deploy-frontend ]
    
    steps:
      - uses: actions/checkout@v3

      - name: Wait for deployment
        run: sleep 30

      - name: Test backend health
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.BACKEND_URL }}/api/health)
          if [ $RESPONSE -eq 200 ]; then
            echo "✅ Backend health check passed"
          else
            echo "❌ Backend health check failed with status $RESPONSE"
            exit 1
          fi

      - name: Test backend connectivity
        run: |
          curl -v ${{ secrets.BACKEND_URL }}/api/health || exit 1

  notify:
    runs-on: ubuntu-latest
    needs: [ deploy-backend, deploy-frontend, smoke-tests ]
    if: always()
    
    steps:
      - name: Notify deployment status
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: 'Production deployment ${{ job.status }}'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        if: always()
